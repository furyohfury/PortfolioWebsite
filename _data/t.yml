    - Developed meta-systems for upgrades and unlocks
    - Developed a saveload system
  neon_what_goals:
    - Building game logic based on the atomic approach (in short, this is an approach similar to ECS, but the systems are contained within the entity, maintaining the separation of data and logic)
    - Building an interface separate from the game logic, based on MVX patterns
    - Building a fully controllable game loop (used, for example, for pausing)
    - Creating a modular data saving system
    - Implementing controls using an input system. Adding touch controls for phones
    - Implementing a 2D lighting system using generated normal maps
  pikmin_goals:
    - Learning the principles of working with Unity's official AI framework
    - Using a component-based monobehavior approach with a facade class and interfaces
    - Creating a modular VFX system
    - Creating a modular Audio system
    - Creating cutscenes with Cinemachine and Timeline
    - Creating decals with URP
    - Creating a renderer feature with URP
  santa_goals:
    - Ability to remotely change project settings—difficulty, scene parameters, etc.—by uploading a JSON file (to Yandex Cloud) at game start (bootstrap scene), as well as through the YG flag system.
    - Integration of the Yandex Games SDK into the project.
    - Implementation of leaderboards, rewarded ad display, and analytics (Metrica) via the Yandex Games SDK.
    - Application of the Strategy pattern for the implementation of the above systems, so other implementations can be substituted for different platforms (an Android build with an SDK like AdMob or others is planned).
    - Use of post-processing effects for visual day/night cycles.
    - Project architecture was not a priority; it needs to be addressed by other portfolio projects.
  sequence_drift_goals:
    - Creating a small game for a game jam in 3 days
    - Working as a developer in tandem with an artist
    - Implementing controls for computers and mobile devices in the web version of the build
  taiko_goals:
    - Integration of Google's Firebase service for authentication and leaderboards. Creation of a separate module for working with Firebase and adapters for game logic interaction with it.
    - Building most of the logic using reactive programming principles with the R3 framework.
    - Using Addressables to work with game assets. Creating an object provider module with the ability to replace the implementation.
    - Implementation of controls for Windows and Android platforms.
    - Independence of game logic from its visual display.
    - Project is expandable to a game with a full list of beatmaps, but i've been too lazy to create a menu for it and parse more beatmaps. 😛
  zero_resistance_goals:
    - Building a small game during a three-day game jam
  crossbow_pvp_goals:
    - Developed a two-player 3D shooter using Unity Netcode and Unity Multiplayer Services.
    - Implemented a lobby creation and connection system using Unity Multiplayer Services.
    - Designed a component-based game character architecture, separating game logic into independent modules and combining them in a facade class to improve extensibility and maintainability.
    - Implemented a networked crossbow shooting system with correct hit synchronization between clients.
    - Developed a visual system for arrows getting stuck in players and the environment through local spawning of client objects without additional network load.
    - Implemented a scoring system and synchronization between players with results displayed in the UI.
    - Developed a flexible UI architecture based on a UI stack.
    - Implemented the UI using R3, UniTask, and DOTween, ensuring reactive data updates, asynchronous event handling, and smooth animations. - Implemented Zenject to implement dependency injection and reduce coupling between game systems. Created a custom NetworkObject prefab spawner with dependency injection.
    - Designed the project architecture with an emphasis on scalability, code readability, and the ability to further expand functionality.

