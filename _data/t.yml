  crossbow_pvp_goals:
    - Разработал мультиплеерный 3D-шутер для двух игроков с использованием Unity Netcode и Unity Multiplayer Services.
    - Реализовал систему создания и подключения к лобби через Unity Multiplayer Services.
    - Спроектировал компонентную архитектуру игрового персонажа, разделив игровую логику на независимые модули с объединением в классе фасаде для повышения расширяемости и поддержки.
    - Реализовал сетевую систему стрельбы из арбалета с корректной синхронизацией попаданий между клиентами.
    - Разработал систему визуального застревания стрел в игроках и окружении через локальный спавн клиентских объектов без дополнительной сетевой нагрузки.
    - Реализовал систему подсчета очков и их синхронизацию между игроками с отображением результатов в UI.
    - Разработал гибкую архитектуру пользовательского интерфейса на основе стековой системы экранов (UI Stack).
    - Реализовал UI с использованием R3, UniTask и DOTween, обеспечив реактивное обновление данных, асинхронную обработку событий и плавные анимации.
    - Внедрил Zenject для организации внедрения зависимостей и снижения связанности между игровыми системами. Создал специальный спавнер NetworkObject префабов с инъекцией в них зависимостей.
    - Спроектировал архитектуру проекта с упором на масштабируемость, читаемость кода и возможность дальнейшего расширения функциональности.